<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d4b896"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)" fill="none" stroke="url(#g)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Hook (top curl) -->
    <path d="M16 3 Q19 3 19 6 Q19 8 16 9" stroke-width="1.8"/>
    <!-- Hanger bar left -->
    <path d="M16 9 Q8 13 4 18" stroke-width="2"/>
    <!-- Hanger bar right -->
    <path d="M16 9 Q24 13 28 18" stroke-width="2"/>
    <!-- Bottom bar -->
    <path d="M4 18 Q4 20 6 20 L26 20 Q28 20 28 18" stroke-width="2"/>
  </g>

  <!-- Swing animation -->
  <animateTransform attributeName="transform" type="rotate"
    values="0 16 9; 4 16 9; 0 16 9; -4 16 9; 0 16 9"
    dur="3s" repeatCount="indefinite"
    calcMode="spline"
    keySplines="0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95"/>
</svg>
